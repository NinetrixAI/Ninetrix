services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ninetrix
      POSTGRES_USER: ninetrix
      POSTGRES_PASSWORD: ninetrix
    ports:
      - "5432:5432"
    volumes:
      - ninetrix-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ninetrix"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/ninetrixai/ninetrix-api:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ninetrix:ninetrix@postgres:5432/ninetrix
      AGENTFILE_RUNNER_TOKENS: ${AGENTFILE_RUNNER_TOKENS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  mcp-gateway:
    image: ghcr.io/ninetrixai/ninetrix-mcp-gateway:latest
    ports:
      - "9090:8080"
    environment:
      MCP_GATEWAY_SECRET: local-dev-secret
      MCP_GATEWAY_REQUIRE_AUTH: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  mcp-worker:
    image: ghcr.io/ninetrixai/ninetrix-mcp-worker:latest
    environment:
      MCP_GATEWAY_URL: ws://mcp-gateway:8080
      # Note: worker connects to gateway on internal Docker port (8080),
      # host accesses gateway on mapped port 9090
      MCP_WORKSPACE_ID: default
      MCP_WORKER_NAME: default
      # Credential env vars — injected by ninetrix dev via _build_proc_env()
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_TEAM_ID: ${SLACK_TEAM_ID:-}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      POSTGRES_CONNECTION_STRING: ${POSTGRES_CONNECTION_STRING:-}
      DATABASE_URL: ${DATABASE_URL:-}
      GOOGLE_DRIVE_ACCESS_TOKEN: ${GOOGLE_DRIVE_ACCESS_TOKEN:-}
    volumes:
      - ${HOME}/.agentfile/mcp-worker.yaml:/app/mcp-worker.yaml:ro
    depends_on:
      mcp-gateway:
        condition: service_healthy

volumes:
  ninetrix-data:
