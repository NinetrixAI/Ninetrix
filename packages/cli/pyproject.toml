[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ninetrix"
version = "0.2.1"
description = "CLI for building and deploying AI agents as containers"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
keywords = ["ai", "agents", "cli", "docker", "automation"]
dependencies = [
    "click>=8.1",
    "rich>=13.7",
    "pyyaml>=6.0",
    "jinja2>=3.1",
    "docker>=7.0",
    "mcp>=1.0",
    "pydantic>=2.0",
    "psycopg[binary]>=3.0",
    "httpx>=0.27",
    "InquirerPy>=0.3",
]

[project.scripts]
ninetrix = "agentfile.cli:cli"
ntx = "agentfile.cli:cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["agentfile*"]

[tool.setuptools.package-data]
"agentfile.templates" = ["*.j2", "*.yaml", "includes/*.j2"]
"agentfile.core" = ["*.json"]
"agentfile.compose" = ["*.yml", "*.yaml"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (slower, real I/O)",
]
filterwarnings = ["ignore::DeprecationWarning"]
