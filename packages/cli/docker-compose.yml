services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentfile
    volumes:
    - db_data:/var/lib/postgresql/data
    networks:
    - agentfile-net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  api:
    image: ghcr.io/ninetrixai/ninetrix-api:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agentfile
      AGENTFILE_RUNNER_TOKENS: ${AGENTFILE_RUNNER_TOKEN}
    ports:
    - 8000:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
    - agentfile-net
    restart: unless-stopped
  matias:
    image: ninetrix/matias:latest
    environment:
      AGENTFILE_PROVIDER: google
      AGENTFILE_MODEL: gemini-2.5-flash-lite
      AGENTFILE_TEMPERATURE: '0.2'
      AGENTFILE_INVOKE_PORT: '9000'
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
      COMPOSIO_ENTITY_ID: ${COMPOSIO_ENTITY_ID}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agentfile
      AGENTFILE_API_URL: http://api:8000
      AGENTFILE_RUNNER_TOKEN: ${AGENTFILE_RUNNER_TOKEN}
    networks:
    - agentfile-net
    extra_hosts:
      host.docker.internal: host-gateway
    restart: unless-stopped
    ports:
    - 9000:9000
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1Gi
    depends_on:
    - db
    - api
networks:
  agentfile-net:
    driver: bridge
volumes:
  db_data: {}
