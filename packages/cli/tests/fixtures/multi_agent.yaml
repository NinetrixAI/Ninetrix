schema_version: "1.1"

agents:
  researcher:
    metadata:
      description: "Research agent"
      role: "researcher"
      goal: "find information"
    runtime:
      provider: anthropic
      model: claude-sonnet-4-6
    tools:
      - name: web_search
        source: mcp://brave-search
    collaborators: [writer]

  writer:
    metadata:
      description: "Writing agent"
      role: "writer"
      goal: "write content"
    runtime:
      provider: openai
      model: gpt-4o
    tools:
      - name: filesystem
        source: mcp://filesystem
    collaborators: [researcher]

triggers:
  - type: webhook
    endpoint: /run
    port: 9100
