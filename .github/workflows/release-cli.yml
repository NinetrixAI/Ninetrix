name: Release CLI

on:
  push:
    tags:
      - "cli/v*"

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli/v}" >> $GITHUB_ENV
      - name: Set version in pyproject.toml
        run: sed -i "s/^version = .*/version = \"${VERSION}\"/" packages/cli/pyproject.toml
      - name: Build wheel
        run: |
          pip install build
          cd packages/cli
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/cli/dist/

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli/v}" >> $GITHUB_ENV
      - name: Get tarball SHA256 from PyPI
        run: |
          pip install requests -q
          python - <<'EOF'
          import os, hashlib, urllib.request, json
          version = os.environ["VERSION"]
          meta = json.loads(urllib.request.urlopen(
              f"https://pypi.org/pypi/ninetrix/{version}/json"
          ).read())
          for f in meta["urls"]:
              if f["packagetype"] == "sdist":
                  print(f"SHA256={f['digests']['sha256']}", flush=True)
                  break
          EOF >> $GITHUB_ENV
      - name: Dispatch formula update to homebrew-tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: Ninetrix-ai/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ env.VERSION }}",
              "sha256": "${{ env.SHA256 }}"
            }
