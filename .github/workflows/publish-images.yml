name: Publish Images

on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - "packages/channels/**"
      - "packages/mcp-gateway/**"
      - "packages/mcp-worker/**"
      - "packages/dashboard/**"

jobs:
  publish-api:
    name: Push ninetrix-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build dashboard static files
        run: |
          pnpm install --no-frozen-lockfile
          pnpm turbo run build --filter=dashboard
          mkdir -p packages/api/static/dashboard
          cp -r packages/dashboard/out/* packages/api/static/dashboard/
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Copy channels package into API build context
        run: cp -r packages/channels packages/api/channels
      - uses: docker/build-push-action@v6
        with:
          context: packages/api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/ninetrixai/ninetrix-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-mcp-gateway:
    name: Push ninetrix-mcp-gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/mcp-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/ninetrixai/ninetrix-mcp-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-mcp-worker:
    name: Push ninetrix-mcp-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/mcp-worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/ninetrixai/ninetrix-mcp-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
