name: Release API Image

on:
  push:
    tags:
      - "api/v*"

jobs:
  build-and-push:
    name: Build & Push ghcr.io/ninetrix-ai/ninetrix-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/api/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Build dashboard and copy into api/static
        run: |
          corepack enable
          pnpm install
          pnpm turbo run build --filter=dashboard
          mkdir -p packages/api/static/dashboard
          cp -r packages/dashboard/out/* packages/api/static/dashboard/

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ninetrix-ai/ninetrix-api:latest
            ghcr.io/ninetrix-ai/ninetrix-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
