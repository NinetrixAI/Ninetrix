name: Bump CLI Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(python - <<'EOF'
          import re
          with open("packages/cli/pyproject.toml") as f:
              m = re.search(r'^version\s*=\s*"([^"]+)"', f.read(), re.M)
              print(m.group(1))
          EOF
          )
          BUMP="${{ inputs.bump }}"
          NEW=$(python - <<EOF
          parts = "$CURRENT".split(".")
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          if "$BUMP" == "major":
              major += 1; minor = 0; patch = 0
          elif "$BUMP" == "minor":
              minor += 1; patch = 0
          else:
              patch += 1
          print(f"{major}.{minor}.{patch}")
          EOF
          )
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW"         >> $GITHUB_OUTPUT

      - name: Update pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.new }}"/' packages/cli/pyproject.toml

      - name: Commit & tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/pyproject.toml
          git commit -m "chore(cli): bump version to ${{ steps.version.outputs.new }}"
          git tag "cli/v${{ steps.version.outputs.new }}"
          git push origin HEAD --tags
