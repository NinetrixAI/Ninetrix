name: Release MCP Worker Image

on:
  push:
    tags:
      - "mcp-worker/v*"

jobs:
  build-and-push:
    name: Build & Push ghcr.io/ninetrixai/ninetrix-mcp-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/mcp-worker/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/mcp-worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ninetrixai/ninetrix-mcp-worker:latest
            ghcr.io/ninetrixai/ninetrix-mcp-worker:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
