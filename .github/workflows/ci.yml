name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-cli:
    name: Lint CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/cli/

  test-cli:
    name: Unit Tests (CLI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CLI with dev dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short

  validate-schema:
    name: Validate JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema pyyaml
      - name: Validate schema is well-formed
        run: python -c "import json, jsonschema; s=json.load(open('packages/cli/agentfile/core/schema.json')); jsonschema.Draft7Validator.check_schema(s); print('Schema OK')"
      - name: Validate examples against schema
        run: |
          python -c "
          import yaml, json, jsonschema, pathlib
          schema = json.load(open('packages/cli/agentfile/core/schema.json'))
          for f in pathlib.Path('examples').rglob('agentfile.yaml'):
              doc = yaml.safe_load(f.read_text())
              try:
                  jsonschema.validate(doc, schema)
                  print(f'  OK: {f}')
              except jsonschema.ValidationError as e:
                  print(f'  FAIL: {f} — {e.message}')
          "

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm turbo run build --filter=dashboard
