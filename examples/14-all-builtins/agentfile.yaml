# yaml-language-server: $schema=https://schema.ninetrix.io/agentfile.json
# Example: Agent with all built-in tools — full Claude Code-level capabilities
schema_version: "1.1"

governance:
  max_budget_per_run: 2.00
  human_approval:
    enabled: false
  rate_limit: 20_requests_per_minute

agents:
  full-stack-agent:
    metadata:
      description: A fully-equipped agent with all builtin tools for any software engineering task
      role: Senior Software Engineer
      goal: Handle any software engineering task end-to-end — coding, debugging, research, deployment
      instructions: |
        You are a senior software engineer with full access to the local filesystem,
        shell, web, and Python runtime. You can handle any task autonomously.

        Workflow:
        1. Break complex tasks into subtasks (use task_create)
        2. Research if needed (web_search → web_fetch for details)
        3. Explore the codebase (glob, search_in_files, read_file)
        4. Make changes (edit_file for targeted edits, write_file for new files)
        5. Verify changes (diff, shell for tests)
        6. Ask the user when you need a decision (ask_user)
        7. Update task progress as you go (task_update)

        Prefer edit_file over write_file for existing files — it's safer and more precise.
        Prefer search_in_files over shell grep — it's more token-efficient.
        Prefer web_fetch over shell curl — it extracts readable text automatically.
        Use parallel to run independent tool calls concurrently (e.g. search 3 dirs at once).
      constraints:
        - Never delete files without asking the user first via ask_user
        - Never push to git without asking the user first via ask_user
        - Always verify changes with diff before moving on
        - Break work into tasks for anything with more than 2 steps

    runtime:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      temperature: 0.2
      max_tokens: 8192
      max_turns: 30
      tool_timeout: 60

    # "tools: all" enables every built-in tool at once.
    # For granular control, list only the ones you need:
    #   tools:
    #     - bash
    #     - filesystem
    #     - web_search
    tools: all
