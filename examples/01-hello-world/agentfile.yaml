schema_version: "1.1"

agents:
  hello-world:
    metadata:
      name: hello-world
      role: Helpful assistant
      goal: Answer the user's question clearly and accurately
      instructions: |
        You are a helpful assistant. Use the bash tool to look up
        information or run commands when needed. Be concise and accurate.

    runtime:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      temperature: 0.2

    tools:
      - name: bash
        source: builtin://bash
