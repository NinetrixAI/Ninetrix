services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ninetrix
      POSTGRES_USER: ninetrix
      POSTGRES_PASSWORD: ninetrix
    ports:
      - "5432:5432"
    volumes:
      - ninetrix-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ninetrix"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/ninetrixai/ninetrix-api:latest
    build:
      context: ../../packages/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ninetrix:ninetrix@postgres:5432/ninetrix
      AGENTFILE_RUNNER_TOKENS: ${AGENTFILE_RUNNER_TOKENS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  mcp-gateway:
    image: ghcr.io/ninetrixai/ninetrix-mcp-gateway:latest
    build:
      context: ../../packages/mcp-gateway
      dockerfile: Dockerfile
    ports:
      - "9090:8080"
    environment:
      MCP_GATEWAY_SECRET: local-dev-secret
      MCP_GATEWAY_REQUIRE_AUTH: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    profiles: ["mcp"]

  mcp-worker:
    image: ghcr.io/ninetrixai/ninetrix-mcp-worker:latest
    build:
      context: ../../packages/mcp-worker
      dockerfile: Dockerfile
    environment:
      MCP_GATEWAY_URL: ws://mcp-gateway:8080
      MCP_WORKSPACE_ID: default
      MCP_WORKER_NAME: default
      # SaaS mode: worker fetches credentials JIT from the vault on first tool call.
      # Set MCP_SAAS_API_URL + MCP_GATEWAY_TOKEN (your nxt_... API token) to enable.
      # ninetrix dev injects these automatically when you are logged in.
      MCP_SAAS_API_URL: ${MCP_SAAS_API_URL:-}
      MCP_GATEWAY_TOKEN: ${MCP_GATEWAY_TOKEN:-dev-secret}
      MCP_GATEWAY_SERVICE_SECRET: ${MCP_GATEWAY_SERVICE_SECRET:-dev-gateway-secret}
    volumes:
      - ${HOME}/.agentfile/mcp-worker.yaml:/app/mcp-worker.yaml:ro
    depends_on:
      mcp-gateway:
        condition: service_healthy
    profiles: ["mcp"]

volumes:
  ninetrix-data:
